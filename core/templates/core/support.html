{% extends "core/base.html" %}
{% block content %}
<h1 class="page-title">الدعم: {{ event.name }}</h1>
<div class="actions"><a class="button" href="{% url 'public-support-status' event.slug %}">متابعة طلب سابق</a></div>
<form method="post" enctype="multipart/form-data" class="panel">
  {% csrf_token %}
  <div class="form-grid">{% for field in form %}<label class="field">{{ field.label }}{{ field }}{{ field.errors }}</label>{% endfor %}</div>
  <div class="actions"><button class="primary" type="submit">إرسال الطلب</button></div>
</form>
{% endblock %}
