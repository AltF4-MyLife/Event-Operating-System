<!doctype html>
<html lang="ar" dir="rtl">
<head><meta charset="utf-8"><style>body{font-family:Tahoma,Arial;padding:40px}.ticket{border:4px solid #0f766e;padding:28px;border-radius:8px}.qr{font-size:20px;background:#eee;padding:16px}</style></head>
<body><div class="ticket"><h1>{{ event.name }}</h1><h2>{{ participant.full_name }}</h2><p>كود الحضور: {{ participant.tracking_code }}</p>{% if qr_image %}<img src="{{ qr_image }}" width="160" height="160" alt="QR">{% endif %}<p class="qr">{{ participant.qr_code }}</p><p>{{ event.public_instructions }}</p></div></body>
</html>
